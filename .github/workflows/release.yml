name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create faber-templates.zip
        run: |
          zip -r faber-templates.zip templates/ scripts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: faber-templates.zip
          generate_release_notes: true
